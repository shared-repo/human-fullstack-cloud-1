<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>글 목록</title>

    <style>
      #loader {
        transition: all 0.3s ease-in-out;
        opacity: 1;
        visibility: visible;
        position: fixed;
        height: 100vh;
        width: 100%;
        background: #fff;
        z-index: 90000;
      }

      #loader.fadeOut {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 40px;
        height: 40px;
        position: absolute;
        top: calc(50% - 20px);
        left: calc(50% - 20px);
        background-color: #333;
        border-radius: 100%;
        -webkit-animation: sk-scaleout 1.0s infinite ease-in-out;
        animation: sk-scaleout 1.0s infinite ease-in-out;
      }

      @-webkit-keyframes sk-scaleout {
        0% { -webkit-transform: scale(0) }
        100% {
          -webkit-transform: scale(1.0);
          opacity: 0;
        }
      }

      @keyframes sk-scaleout {
        0% {
          -webkit-transform: scale(0);
          transform: scale(0);
        } 100% {
          -webkit-transform: scale(1.0);
          transform: scale(1.0);
          opacity: 0;
        }
      }
    </style>
  	<script defer="defer" th:src="@{/main.js}"></script>
  </head>
  <body class="app">
    
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <script>
      window.addEventListener('load', function load() {
        const loader = document.getElementById('loader');
        setTimeout(function() {
          loader.classList.add('fadeOut');
        }, 300);
      });
    </script>
    
    <div>
      
      <div th:replace="~{page_modules/sidebar :: sidebar}"></div>

      <!-- #Main ============================ -->
      <div class="page-container">
        
        <div th:replace="~{page_modules/topbar :: topbar}"></div>
        
        <!-- ### $App Screen Content ### -->
        <main class="main-content bgc-grey-100">
          <div id="mainContent">
          	<div class="container-fluid">
          	  <div class="row">
                <div class="col-md-12">
                  <div class="bgc-white bd bdrs-3 p-20">
                  	<div class="d-flex justify-content-between mB-20">
	                  <h4 class="c-grey-900">게시글 목록</h4>
	                  <button id="write-btn" class="btn btn-primary btn-sm">글쓰기</button>
                    </div>
                    <table class="table table-hover">
                      <thead>
                        <tr>
                          <th scope="col">글번호</th>
                          <th scope="col">제목</th>
                          <th scope="col">작성자</th>
                          <th scope="col">작성일</th>
                          <th scope="col">조회수</th>
                        </tr>
                      </thead>
                      <tbody>                      
                        <tr th:each="board: ${boards}" style="height:30px">
                          <th scope="row" th:text="${ board.boardNo }"></th>
                          <td>
                          	<a 	th:href="@{/board/detail(pageNo=${pager.pageNo}, boardNo=${board.boardNo}) }"
                          		th:text="${ board.title }"></a>
                          </td>
                          <td th:text="${ board.writer.email }"></td>
                          <td th:text="${ #dates.format(board.writeDate, 'yyyy-MM-dd') }"></td>
                          <td th:text="${ board.readCount }"></td>
                        </tr>
                      </tbody>
                    </table>
                    
					<nav aria-label="board pager">
	                    <ul class="pagination justify-content-center">
	                    <li class="page-item">	                            
	                            <a th:if="${ pager.pageNo > 1}" class="page-link" th:href="@{/board/list(pageNo=1)}" aria-label="First">
	                                <span aria-hidden="true">&laquo;</span>
	                            </a>
	                            <a th:if="${ pager.pageNo <= 1}" class="page-link" href="javascript:" aria-label="First">
	                                <span aria-hidden="true">&laquo;</span>
	                            </a>
	                    </li>
	                    <li class="page-item">
                     
	                        <a th:if="${ pager.pageNo > 1}" class="page-link" th:href="@{/board/list(pageNo=${pager.pageNo - 1})}" aria-label="Previous">
	                        <span aria-hidden="true">&lt;</span>
	                        </a>
	                        <a th:if="${ pager.pageNo <= 1}"  class="page-link" href="javascript:" aria-label="Previous">
	                            <span aria-hidden="true">&lt;</span>
	                        </a>
	                    </li>
	                    <li th:each="i : ${#numbers.sequence(pager.pageStart, (pageCnt < pager.pageEnd ? pager.pageCnt : pager.pageEnd))}" class="page-item">
	                    	
	                        <a class="page-link" th:href="@{/board/list(pageNo=${i})}" th:text="${i}"></a>
	                    </li>
	                    
	                    <li class="page-item">
	                        <a th:if="${ pager.pageNo < pager.pageCnt }" class="page-link" th:href="@{/board/list(pageNo=${pager.pageNo+1})}" aria-label="Next">
	                        <span aria-hidden="true">&gt;</span>
	                        </a>
	                        <a th:if="${ pager.pageNo >= pager.pageCnt }" class="page-link" href="javascript:" aria-label="Previous">
	                            <span aria-hidden="true">&gt;</span>
	                        </a>
	                    </li>
	                    <li class="page-item">
	                        <a th:if="${ pager.pageNo < pager.pageCnt }" class="page-link" th:href="@{/board/list(pageNo=${pager.pageCnt})}" aria-label="Last">
	                        <span aria-hidden="true">&raquo;</span>
	                        </a>
	                        <a th:if="${ pager.pageNo >= pager.pageCnt }" class="page-link" href="javascript:" aria-label="Last">
	                            <span aria-hidden="true">&raquo;</span>
	                        </a>
	                    </li>
	                    </ul>
	                </nav>                    
                    
                  </div>
                </div>
              </div>
          	</div>
          </div>
        </main>

        <!-- ### $App Screen Footer ### -->
        <footer class="bdT ta-c p-30 lh-0 fsz-sm c-grey-600">
          <span>Copyright © 2025 Designed by <a href="https://colorlib.com" target="_blank" rel="nofollow noopener noreferrer" title="Colorlib">Colorlib</a>. All rights reserved.</span>
        </footer>
      </div>
    </div>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const writeBtn = document.querySelector('#write-btn');
        writeBtn.addEventListener('click', function() {
            window.location.href = '/board/write';
        });
    });
    </script>
    
  </body>
</html>
