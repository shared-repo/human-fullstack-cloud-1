<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>글 작성</title>

    <style>
      #loader {
        transition: all 0.3s ease-in-out;
        opacity: 1;
        visibility: visible;
        position: fixed;
        height: 100vh;
        width: 100%;
        background: #fff;
        z-index: 90000;
      }

      #loader.fadeOut {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 40px;
        height: 40px;
        position: absolute;
        top: calc(50% - 20px);
        left: calc(50% - 20px);
        background-color: #333;
        border-radius: 100%;
        -webkit-animation: sk-scaleout 1.0s infinite ease-in-out;
        animation: sk-scaleout 1.0s infinite ease-in-out;
      }

      @-webkit-keyframes sk-scaleout {
        0% { -webkit-transform: scale(0) }
        100% {
          -webkit-transform: scale(1.0);
          opacity: 0;
        }
      }

      @keyframes sk-scaleout {
        0% {
          -webkit-transform: scale(0);
          transform: scale(0);
        } 100% {
          -webkit-transform: scale(1.0);
          transform: scale(1.0);
          opacity: 0;
        }
      }
    </style>
  	<script defer="defer" th:src="@{/main.js}"></script>
  </head>
  <body class="app">
    
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <script>
      window.addEventListener('load', function load() {
        const loader = document.getElementById('loader');
        setTimeout(function() {
          loader.classList.add('fadeOut');
        }, 300);
      });
    </script>
    
    <div>
      
      <div th:replace="~{page_modules/sidebar :: sidebar}"></div>

      <!-- #Main ============================ -->
      <div class="page-container">
        
        <div th:replace="~{page_modules/topbar :: topbar}"></div>
        
        <!-- ### $App Screen Content ### -->
        <main class="main-content bgc-grey-100">
          <div id="mainContent">
            <div class="container-fluid">
          	  <div class="row">
                <div class="col-md-12">
                  <div class="bgc-white p-20 bd">
                  <h6 class="c-grey-900">게시글 쓰기</h6>
                  <div class="mT-30">
                    <form action="/board/write" method='post' enctype="multipart/form-data">
                    <!-- <form action="/board/write" method='post'> -->
                      <div class="mb-3">
                        <label class="form-label" for="title">제목</label>
                        <input type="text" class="form-control" id="title" name="title" placeholder="글 제목을 작성하세요">
                      </div>
                      <div class="mb-3">
                        <label class="form-label" for="writer">작성자(email)</label>
                        <input type="text" class="form-control" id="writer" name="writer.email" readonly th:value="${ session.loginuser.email }">
                      </div>
                       
                      <div class="mb-3">
                        <label class="form-label" for="attachment">첨부파일</label>
                        <input type="file" id="attachment" name="attachment" class="form-control" accept="video/*">
                      </div>
                     
                      <div class="mb-3">
                        <label class="form-label" for="content">글내용</label>
                        <textarea id="content" name="content" class="form-control" rows="10"></textarea>
                      </div>
                      <div>
	                    <button type="submit" id="write-btn" class="btn btn-primary btn-color btn-sm">글 작성</button>
	                    <button type="button" id="cancel-btn" class="btn btn-primary btn-color btn-sm">취소</button>
                      </div>
                    </form>
                  </div>
                </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        
      </div>
      
    </div>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const cancelBtn = document.querySelector('#cancel-btn');
        cancelBtn.addEventListener('click', function() {
            window.location.href = "list"; // /board/list
        });
    });
	</script>
  </body>
</html>
