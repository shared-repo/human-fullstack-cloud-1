<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>글 내용</title>

    <style>
      #loader {
        transition: all 0.3s ease-in-out;
        opacity: 1;
        visibility: visible;
        position: fixed;
        height: 100vh;
        width: 100%;
        background: #fff;
        z-index: 90000;
      }

      #loader.fadeOut {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 40px;
        height: 40px;
        position: absolute;
        top: calc(50% - 20px);
        left: calc(50% - 20px);
        background-color: #333;
        border-radius: 100%;
        -webkit-animation: sk-scaleout 1.0s infinite ease-in-out;
        animation: sk-scaleout 1.0s infinite ease-in-out;
      }

      @-webkit-keyframes sk-scaleout {
        0% { -webkit-transform: scale(0) }
        100% {
          -webkit-transform: scale(1.0);
          opacity: 0;
        }
      }

      @keyframes sk-scaleout {
        0% {
          -webkit-transform: scale(0);
          transform: scale(0);
        } 100% {
          -webkit-transform: scale(1.0);
          transform: scale(1.0);
          opacity: 0;
        }
      }
    </style>
  	<script defer="defer" th:src="@{/main.js}"></script>
  </head>
  <body class="app">
    
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <script>
      window.addEventListener('load', function load() {
        const loader = document.getElementById('loader');
        setTimeout(function() {
          loader.classList.add('fadeOut');
        }, 300);
      });
    </script>
    
    <div>
      
      <div th:replace="~{page_modules/sidebar :: sidebar}"></div>

      <!-- #Main ============================ -->
      <div class="page-container">
        
        <div th:replace="~{page_modules/topbar :: topbar}"></div>
        
        <!-- ### $App Screen Content ### -->
        <main class="main-content bgc-grey-100">
          <div id="mainContent">
            <div class="container-fluid">
          	  <div class="row">
                <div class="col-md-12">
                  <div class="bgc-white p-20 bd">
                  <h6 class="c-grey-900">게시글 내용</h6>
                  <div class="mT-30">
                      <div class="mb-3">
                        <label class="form-label" for="title">제목</label>
                        <input type="text" class="form-control" id="title" readonly th:value="${ board.title }">
                      </div>
                      <div class="mb-3">
                        <label class="form-label" for="writer">작성자(email)</label>
                        <input type="text" class="form-control" id="writer" readonly th:value="${ board.writer.email }">
                      </div>
                      <div class="mb-3">
                        <label class="form-label">첨부파일</label>
                        <div class="alert alert-success" role="alert" th:each="attachment: ${board.attachments}">
	                        <span th:text="${attachment.userFileName}"></span>&nbsp;&nbsp;
	                        [<a th:href="@{/board/download(attachNo=${attachment.attachNo})}">다운로드</a>]
                        </div>
                      </div>
                      <div class="mb-3">
                        <label class="form-label" for="content">글내용</label>
                        <textarea id="content" class="form-control" rows="10" readonly th:text='${ #strings.replace(board.content, "\n", "<br>") }'></textarea>
                      </div>
                      <div>
                      	<th:block th:if="${ session.loginuser != null && session.loginuser.email == board.writer.email }">
	                    <button type="button" id="edit-btn" class="btn btn-primary btn-color btn-sm">수정</button>
	                    <button type="button" id="delete-btn" class="btn btn-primary btn-color btn-sm">삭제</button>
	                    </th:block>
	                    <button type="button" id="to-list-btn" class="btn btn-primary btn-color btn-sm">목록</button>
                      </div>

                  </div>
                </div>
                </div>
              </div>
              
              <!-- 댓글 쓰기 영역 시작 -->
              <div class="row">
                <div class="col-md-12">
                  <div class="bgc-white p-20 bd">                  
                  <div class="mT-10">
                  	<form id="commentform" action="write-comment" method="post">
					  <input type="hidden" name="boardNo" th:value="${ board.boardNo }" />
					  <input type="hidden" name="pageNo" th:value="${ pageNo }" />
					  <input type="hidden" name="writer" th:value="${ session.loginuser.email }" />
                      
                      <div class="mb-3">
                        <label class="form-label" for="content">댓글내용</label>
                        <textarea id="comment_content" name="content" class="form-control" rows="5"></textarea>
                      </div>
                      <div>
	                    <button type="button" id="writecomment" class="btn btn-primary btn-color btn-sm">댓글쓰기</button>
                      </div>
					</form>
                  </div>
                </div>
                </div>
              </div>
              <!--  댓글 쓰기 영역 끝 -->
              
              <!--  댓글 목록 영역 시작 -->
              <div class="row">
                <div class="col-md-12">
                  <div class="bgc-white p-20 bd">                  
                  <div id="comment-list" class="mT-10">
                  	
                  </div>
                </div>
                </div>
              </div>
              <!-- 댓글 목록 영역 끝 -->
                           
            </div>
          </div>
          
        </main>        
      </div>      
    </div>
    
    <!-- Modal -->
	<div class="modal fade" id="recomment-modal" 
		 data-bs-backdrop="static" data-bs-keyboard="false" 
		 tabindex="-1" aria-labelledby="recomment-modal-label" aria-hidden="true">
	  <div class="modal-dialog">
	    <div class="modal-content">
	      <div class="modal-header">
	        <h1 class="modal-title fs-5" id="recomment-modal-label">댓글 쓰기</h1>
	      </div>
	      <div class="modal-body">
	      <!-- write comment area -->
			<form id="recommentform" action="write-recomment" method="post">
				<input type="hidden" name="commentNo" value="" />
				<input type="hidden" name="writer" th:value="${ session.loginuser.email }" />
				   
				<textarea class="form-control" name="content" rows="3" style="resize: none;"></textarea>             	
	        </form>
		  <!-- end of write comment area -->
	      </div>
	      <div class="modal-footer">
	        <button type="button" class="btn btn-secondary cancel-button" data-bs-dismiss="modal">취소</button>
	        <button type="button" class="btn btn-primary write-button">쓰기</button>
	      </div>
	    </div>
	  </div>
	</div>
    
    <script src="http://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:inline='javascript'>
    document.addEventListener('DOMContentLoaded', function() {

        const cancelBtn = document.querySelector('#to-list-btn');
        cancelBtn.addEventListener('click', function() {
            window.location.href = "list?boardNo=" + [[${board.boardNo}]] + "&pageNo=" + [[${ pageNo }]]; // /board/list
        });
        
        const btnDelete = document.querySelector('#delete-btn');
		if (btnDelete) {
			btnDelete.addEventListener('click', function(event) {
				const isOk = window.confirm('삭제할까요?');
				if (isOk) {
					location.href = 'delete?boardNo=' + [[${ board.boardNo }]] + "&pageNo=" + [[${ pageNo }]];
				}
			});	
		}
		
		const btnEdit = document.querySelector('#edit-btn');
		if (btnEdit) {
			btnEdit.addEventListener('click', function(event) {
				location.href = 'edit?boardNo=' + [[${ board.boardNo }]] + "&pageNo=" + [[${ pageNo }]];
			});	
		}
		
		///////////////////////////////
		
		// # id="comment-list" 요소에 comment-list 요청 결과를 삽입 ( 비동기 )
		$('#comment-list').load('comment-list?boardNo=' + [[${ board.boardNo }]]);
		
		$('#writecomment').on('click', function(event) {
			// alert('서버로 댓글 쓰기 요청');
			// $('#commentform').submit(); // form 객체의 submit 메서드는 form을 서버로 전송하는 명령 (동기 방식)
			
			/*
 			const boardNo = $('#commentform input[name=boardNo]').val();
			const writer = $('#commentform input[name=writer]').val();
			const content = $('#commentform textarea[name=content]').val();			
			*/
			
			const formData = $('#commentform').serialize(); //form 내부의 모든 입력 요소의 값을 전송 가능한 문자열 형식으로 반환
			// const formData = $('#commentform').serializeArray(); //form 내부의 모든 입력 요소의 값을 전송 가능한 객체 배열 형식으로 반환
						
			$.ajax({
				"url": "write-comment",
				"method": "post",
				"data": formData,
				"success": function(data, status, xhr) {
					if (data == "success") {
						// alert('댓글을 등록했습니다.');
						$('#comment-list').load('comment-list?boardNo=' + [[${ board.boardNo }]]);
						$('#commentform textarea').val("");
					}
				},
				"error": function(xhr, status, err) {
					
				}
			});
		}); // end of writecomment.click event handler
		
		let currentEditCommentNo = null; // 현재 편집중인 댓글 번호 저장
		
		$('#comment-list').on('click', '.edit-comment', function(event) {
			event.preventDefault();
			
			if (currentEditCommentNo != null) {
				$('#comment-view-area-' + currentEditCommentNo).show();
				$('#comment-edit-area-' + currentEditCommentNo).hide();
			}
			
			var commentNo = $(this).data('comment-no'); // $(this) : 이벤트 발생 객체 (여기서는 <a class="edit-comment" ...>)
			
			$('#comment-view-area-' + commentNo).hide();
			$('#comment-edit-area-' + commentNo).show();
			
			currentEditCommentNo = commentNo
		});
		$('#comment-list').on('click', '.cancel-edit-comment', function(event) {
			event.preventDefault();
			
			var commentNo = $(this).data("comment-no"); // $(this) : 이벤트 발생 객체 (여기서는 <a class="cancel-edit-comment" ...>)
			const editForm = $('#comment-edit-area-' + commentNo + ' form');
			editForm[0].reset(); // editForm : jQuery 객체 , editForm[0] : javascript 객체
			
			$('#comment-view-area-' + commentNo).show();
			$('#comment-edit-area-' + commentNo).hide();
			
			currentEditCommentNo = null;
		});
		
		// 댓글 삭제
		// $('#comment-list .delete-comment').on('click', function(event) {
		$('#comment-list').on('click', '.delete-comment', function(event) {
			event.preventDefault();
							// this == event.target
			var commentNo = $(this).data('comment-no'); // .data('comment-no') --> data-comment-no="value"를 조회
			
			const yn = confirm(commentNo + "번 댓글을 삭제할까요?");
			if (!yn) return;
			
			// 동기 방식 All Refresh 요청
			//location.href = 
			//	'delete-comment?commentNo=' + commentNo + '&boardNo=${board.boardNo}&pageNo=${pageNo}';
			
			// jQuery 기반의 비동기(ajax) 요청
			$.ajax({
				"url": "delete-comment",
				"method": "get",
				"data" : 'commentNo=' + commentNo,
				"success": function(data, status, xhr) {
					if (data == "success") {
						// 1. 해당 댓글만 수정
						/*
						const html = `<br><br>
							<span style='color:gray'>삭제된 글입니다.</span>
							<br><br>`						
						$('#comment-view-area-' + commentNo).html(html); 
						*/
						// 2. 댓글 목록 전체 갱신
						//    jQuery의 load 함수 : 지정된 html 요소의 내용을 응답받은 부분 HTML로 (비동기) 갱신
						$('#comment-list').load('comment-list?boardNo=' + [[${ board.boardNo }]]);
					} else {
						alert('삭제 실패 2');
					}
					
				},
				"error": function(xhr, status, err) {
					alert('삭제 실패 1');
				}
			});
			
		});
		
		// 댓글 수정
		// $('#comment-list .update-comment').on('click', function(event) {
		$('#comment-list').on('click', '.update-comment', function(event) {
			const commentNo = $(this).data('comment-no'); // $(this) : 이벤트 발생한 객체, .data('abc') : data-abc 값 읽기
			
			const editForm = $('#comment-edit-area-' + commentNo + ' form');
			// alert(editForm.serialize());
			
			$.ajax({
				"url": "update-comment",
				"method": "post",
				"data": editForm.serialize(),
				"success": function(data) {
					if (data == "success") {
						$('#comment-list').load('comment-list?boardNo=' + [[${ board.boardNo }]]);
					}
				},
				"error": function(xhr, status, err) {
					alert('fail : ' + status);
				}
			});
		});
		
		// 대댓글 버튼 클릭 이벤트 처리기 - 클릭했을 때 모달 표시
		$('#comment-list').on('click', ".recomment-link", function(event) {
			event.preventDefault();
			
			var commentNo = $(this).data("comment-no");
			$('#recommentform')[0].reset();
			$('#recommentform input[name=commentNo]').val(commentNo);
			
			// javascript code로 modal 표시
			$('#recomment-modal').modal('show');
			
		});
		
		$('#recomment-modal .write-button').on('click', function(event) {
			
			if ( $('#recommentform textarea').val().length == 0 ) {
				alert('댓글을 작성하세요')
				return;
			}
			
			var formData = $('#recommentform').serialize();
			
			$.ajax({
				"url": "write-recomment",
				"method": "post",
				"data": formData,
				"success": function(data) {
					if (data == "success") {
						$('#comment-list').load('comment-list?boardNo=' + [[${ board.boardNo }]]);
						$('#recomment-modal').modal('hide');
					}
				},
				"error": function() {
					
				}
			});			
		
		});
		
        
    });
	</script>
  </body>
</html>
